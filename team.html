<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Équipe — Cap sur les vacances</title>
<link rel="stylesheet" href="style.css">
<style>
  .big-input{font-size:1.4rem; text-align:center; letter-spacing:4px; text-transform:uppercase;}
  .num-input{font-size:1.6rem; text-align:center;}
  .status-note{color:var(--muted); text-align:center;}
  .my-score{font-size:1.1rem; text-align:center; color:var(--gold); font-weight:800;}
</style>
</head>
<body>
<div class="scoreboard" id="scoreboard"></div>
<main><div class="screen" id="screen"></div></main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const TEAM_COLORS = ['#2FBFA5','#FF6F59','#F4B740','#7A8FE0','#E06BC1','#63C2E0'];

let roomCode = localStorage.getItem('ndrc_room') || '';
let teamId = localStorage.getItem('ndrc_teamId') || '';
let teamName = localStorage.getItem('ndrc_teamName') || '';
let sessionRef = null;
let myScore = 0;
let broadcast = { game:null, phase:'idle', payload:{} };
let hasAnsweredThisRound = false;
let screenState = 'join';

function renderScoreboard(){
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = `<div class="brand">🎓 ${teamName || 'Cap sur les vacances'}</div>
    ${teamName ? `<div class="team-pill"><span class="tname">Score</span><span class="tscore">${myScore} pts</span></div>` : ''}`;
}

function render(){
  renderScoreboard();
  const el = document.getElementById('screen');
  if(screenState==='join') el.innerHTML = renderJoin();
  else el.innerHTML = renderGame();
}

function renderJoin(){
  return `
    <h1 class="title">Rejoindre la <span>salle</span></h1>
    <div class="card">
      <p class="status-note" style="margin-bottom:10px;">Code de la salle (donné par le prof)</p>
      <input id="codeInput" class="big-input" maxlength="4" placeholder="0000" value="${roomCode}">
      <div style="height:14px;"></div>
      <p class="status-note" style="margin-bottom:10px;">Nom de votre équipe</p>
      <input id="nameInput" placeholder="Ex : Les Négociateurs" value="${teamName}">
      <div style="height:18px;"></div>
      <button class="btn" onclick="joinRoom()" style="width:100%;">Rejoindre ➜</button>
      <p id="joinError" class="status-note" style="color:var(--coral); margin-top:10px;"></p>
    </div>
  `;
}

function joinRoom(){
  const code = document.getElementById('codeInput').value.trim();
  const name = document.getElementById('nameInput').value.trim();
  const err = document.getElementById('joinError');
  if(!/^\d{4}$/.test(code)){ err.textContent = 'Le code doit contenir 4 chiffres.'; return; }
  if(!name){ err.textContent = 'Merci de saisir un nom d\'équipe.'; return; }
  db.ref('sessions/'+code).once('value').then(snap=>{
    if(!snap.exists()){ err.textContent = 'Aucune salle avec ce code. Vérifiez avec le prof.'; return; }
    roomCode = code;
    teamName = name;
    const existingTeams = (snap.val().teams)||{};
    // reuse existing teamId if this name already joined this room (e.g. refresh)
    const found = Object.entries(existingTeams).find(([id,t])=>t.name===name);
    if(found){
      teamId = found[0];
    } else {
      teamId = db.ref('sessions/'+code+'/teams').push().key;
      const color = TEAM_COLORS[Object.keys(existingTeams).length % TEAM_COLORS.length];
      db.ref('sessions/'+code+'/teams/'+teamId).set({name, color, score:0, joinedAt:Date.now()});
    }
    localStorage.setItem('ndrc_room', roomCode);
    localStorage.setItem('ndrc_teamId', teamId);
    localStorage.setItem('ndrc_teamName', teamName);
    attachListeners();
    screenState = 'waiting';
    render();
  });
}

function attachListeners(){
  sessionRef = db.ref('sessions/'+roomCode);
  sessionRef.child('teams/'+teamId+'/score').on('value', snap=>{
    myScore = snap.val() || 0;
    renderScoreboard();
  });
  sessionRef.child('broadcast').on('value', snap=>{
    const newBroadcast = snap.val() || {game:null, phase:'idle', payload:{}};
    const changed = JSON.stringify(newBroadcast) !== JSON.stringify(broadcast);
    broadcast = newBroadcast;
    if(changed){ hasAnsweredThisRound = false; }
    screenState = 'game';
    render();
  });
}

/* auto-rejoin on reload */
if(roomCode && teamId && teamName){
  db.ref('sessions/'+roomCode).once('value').then(snap=>{
    if(snap.exists()){
      attachListeners();
      screenState = 'game';
      render();
    } else {
      screenState = 'join';
      render();
    }
  });
} else {
  render();
}

function submitAnswer(value){
  if(hasAnsweredThisRound) return;
  hasAnsweredThisRound = true;
  sessionRef.child('answers/'+teamId).set({value, ts:Date.now()});
  render();
}

function renderGame(){
  const g = broadcast.game, p = broadcast.phase, payload = broadcast.payload||{};

  if(!g || p==='idle'){
    return `<div class="card" style="text-align:center;"><p class="status-note">En attente que le prof lance un jeu…</p></div>`;
  }

  if(g==='quiz'){
    if(p==='question'){
      const answersHtml = payload.a.map((ans,i)=>
        `<button class="answer-btn ${hasAnsweredThisRound?'disabled':''}" onclick="submitAnswer(${i})">${ans}</button>`
      ).join('');
      return `<div class="card">
        <span class="qtag">${payload.cat}</span>
        <p class="question-text">${payload.q}</p>
        <div class="answers">${answersHtml}</div>
        ${hasAnsweredThisRound ? `<p class="status-note" style="margin-top:14px;">Réponse envoyée ✔ En attente des autres équipes…</p>` : ''}
      </div>`;
    }
    if(p==='revealed'){
      return `<div class="card" style="text-align:center;">
        <p class="question-text">${payload.q}</p>
        <p class="status-note"><b style="color:var(--gold)">Bonne réponse : ${payload.a[payload.correct]}</b></p>
      </div>`;
    }
  }

  if(g==='vf'){
    if(p==='question'){
      return `<div class="card" style="text-align:center;">
        <p class="question-text">${payload.s}</p>
        <div class="btn-row">
          <button class="btn coral" style="padding:22px 40px; font-size:1.2rem;" ${hasAnsweredThisRound?'disabled':''} onclick="submitAnswer(true)">VRAI</button>
          <button class="btn" style="padding:22px 40px; font-size:1.2rem;" ${hasAnsweredThisRound?'disabled':''} onclick="submitAnswer(false)">FAUX</button>
        </div>
        ${hasAnsweredThisRound ? `<p class="status-note" style="margin-top:14px;">Réponse envoyée ✔</p>` : ''}
      </div>`;
    }
    if(p==='revealed'){
      return `<div class="card" style="text-align:center;">
        <p class="question-text">${payload.s}</p>
        <p class="status-note"><b style="color:var(--gold)">${payload.v?'VRAI':'FAUX'}</b> — ${payload.expl}</p>
      </div>`;
    }
  }

  if(g==='estimation'){
    if(p==='question'){
      return `<div class="card" style="text-align:center;">
        <p class="question-text">${payload.q}</p>
        ${hasAnsweredThisRound
          ? `<p class="status-note">Estimation envoyée ✔ En attente des autres équipes…</p>`
          : `<input id="estInput" class="num-input" type="number" placeholder="Votre estimation">
             <div style="height:14px;"></div>
             <button class="btn" style="width:100%;" onclick="submitAnswer(parseFloat(document.getElementById('estInput').value)||0)">Valider</button>`
        }
      </div>`;
    }
    if(p==='revealed'){
      return `<div class="card" style="text-align:center;">
        <p class="question-text">${payload.q}</p>
        <p class="status-note"><b style="color:var(--gold)">Réponse : ${payload.answer} ${payload.unit}</b></p>
        <p class="status-note">${payload.expl}</p>
      </div>`;
    }
  }

  if(g==='wheel'){
    if(p==='lobby'){
      return `<div class="card" style="text-align:center;"><p class="status-note">Le prof choisit l'équipe qui va tirer une objection…</p></div>`;
    }
    if(p==='turn'){
      const isMe = payload.activeTeamId===teamId;
      return `<div class="card" style="text-align:center;">
        <p class="status-note">${isMe ? "🎯 C'est à vous !" : 'Tour de : ' + payload.activeTeamName}</p>
        <p class="question-text">« ${payload.objection} »</p>
        <p class="status-note">${isMe ? "Répondez à l'oral devant la classe, vous avez 45 secondes." : 'Écoutez et préparez-vous pour votre tour.'}</p>
      </div>`;
    }
    if(p==='scored'){
      return `<div class="card" style="text-align:center;">
        <p class="status-note">${payload.activeTeamName} a reçu <b style="color:var(--gold)">+${payload.pts} pt(s)</b></p>
      </div>`;
    }
  }

  if(p==='podium'){
    const sorted = Object.values(payload.teams||{}).sort((a,b)=>(b.score||0)-(a.score||0));
    const rows = sorted.map((t,i)=>`<div class="live-row"><span>${i===0?'🥇':i===1?'🥈':i===2?'🥉':'—'} ${t.name}</span><span>${t.score||0} pts</span></div>`).join('');
    return `<h2 class="title">🏆 Podium</h2><div class="card"><div class="live-list">${rows}</div></div>`;
  }

  return `<div class="card" style="text-align:center;"><p class="status-note">En attente…</p></div>`;
}
</script>
</body>
</html>
